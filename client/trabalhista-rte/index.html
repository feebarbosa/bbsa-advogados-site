Fp>\n        <\u002Fdiv>\n      <\u002Fdiv>\n      <p style=\"font-size:12.5px;line-height:1.7;color:#7E907F;margin-top:28px\">Este site tem caráter exclusivamente informativo e não constitui consulta, publicidade de resultados ou captação de clientela, em conformidade com o Código de Ética e o Provimento da OAB. Nenhuma informação aqui representa promessa ou garantia de resultado. Cada situação é analisada individualmente.<\u002Fp>\n      <p style=\"font-size:12.5px;color:#5E6F5F;margin-top:16px\">© 2026 BBSA Advogados. Todos os direitos reservados.<\u002Fp>\n    <\u002Fdiv>\n  <\u002Ffooter>\n\n  <!-- FLOATING WHATSAPP -->\n  <a href=\"{{ waLink }}\" target=\"_blank\" rel=\"noopener\" aria-label=\"Falar no WhatsApp\" style=\"position:fixed;right:18px;bottom:18px;z-index:60;width:60px;height:60px;border-radius:50%;background:#25D366;display:flex;align-items:center;justify-content:center;animation:floatPulse 2.4s ease-in-out infinite\">\n    <svg width=\"32\" height=\"32\" viewBox=\"0 0 24 24\" fill=\"#fff\" aria-hidden=\"true\"><path d=\"M.057 24l1.687-6.163a11.867 11.867 0 01-1.587-5.946C.16 5.335 5.495 0 12.05 0a11.82 11.82 0 018.413 3.488 11.82 11.82 0 013.48 8.414c-.003 6.557-5.338 11.892-11.893 11.892a11.9 11.9 0 01-5.688-1.448L.057 24zm6.597-3.807c1.676.995 3.276 1.591 5.392 1.592 5.448 0 9.886-4.434 9.889-9.885.002-5.462-4.415-9.89-9.881-9.892-5.452 0-9.887 4.434-9.889 9.884a9.86 9.86 0 001.51 5.26l-.999 3.648 3.978-1.207zm11.387-5.464c-.074-.124-.272-.198-.57-.347-.297-.149-1.758-.868-2.031-.967-.272-.099-.47-.149-.669.149-.198.297-.768.967-.941 1.165-.173.198-.347.223-.644.074-.297-.149-1.255-.462-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.297-.347.446-.521.151-.172.2-.296.3-.495.099-.198.05-.372-.025-.521-.075-.148-.669-1.611-.916-2.206-.242-.579-.487-.501-.669-.51l-.57-.01c-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.095 3.2 5.076 4.487.709.306 1.263.489 1.694.626.712.226 1.36.194 1.872.118.571-.085 1.758-.719 2.006-1.413.248-.695.248-1.29.173-1.414z\"><\u002Fpath><\u002Fsvg>\n  <\u002Fa>\n\n<\u002Fdiv>\n<\u002Fx-dc>\n<script type=\"text/x-dc\" data-dc-script=\"\" data-props=\"{&quot;$preview&quot;:{&quot;width&quot;:390,&quot;height&quot;:844},&quot;whatsappNumber&quot;:{&quot;editor&quot;:&quot;text&quot;,&quot;default&quot;:&quot;5511970366992&quot;,&quot;tsType&quot;:&quot;string&quot;}}\">\nclass Component extends DCLogic {\n  state = { open: -1 };\n\n  get waLink() {\n    const num = this.props.whatsappNumber || \"5511970366992\";\n    const msg = encodeURIComponent(\"Olá, gostaria de falar com um advogado trabalhista para analisar meu caso.\");\n    return \"https://wa.me/\" + num + \"?text=\" + msg;\n  }\n\n  renderVals() {\n    const open = this.state.open;\n    const faqData = [\n      { q: \"Posso processar a empresa mesmo depois de pedir demissão?\", a: \"Sim. Pedir demissão não apaga direitos relativos ao período em que você trabalhou. Vale conversar para entender o que se aplica à sua situação.\" },\n      { q: \"Quanto custa falar com um advogado?\", a: \"A conversa inicial pelo WhatsApp é para entender o seu caso e tirar dúvidas. As condições de qualquer atendimento posterior são explicadas com total transparência, antes de qualquer decisão sua.\" },\n      { q: \"Preciso ter documentos para conversar?\", a: \"Não é obrigatório para a conversa inicial. Documentos como holerites, carteira de trabalho e mensagens ajudam na análise, mas você pode começar apenas relatando o que aconteceu.\" },\n      { q: \"Trabalhei como PJ. Ainda assim posso ter direitos trabalhistas?\", a: \"Pode ser que sim. Quando o trabalho como PJ tem características de vínculo de emprego — horário, subordinação, exclusividade — é possível avaliar a situação com mais cuidado.\" },\n      { q: \"Fui demitido por justa causa. Ainda tenho algum direito?\", a: \"Mesmo na justa causa existem direitos que continuam devidos, e a própria aplicação da justa causa pode ser analisada. Vale verificar caso a caso.\" },\n      { q: \"Posso falar com um advogado direto pelo WhatsApp?\", a: \"Sim. O primeiro contato é feito pelo WhatsApp, de forma prática, para você explicar sua situação e receber orientação inicial sem precisar se deslocar.\" },\n      { q: \"Quanto tempo costuma demorar um processo trabalhista?\", a: \"O tempo varia conforme o caso, a comarca e a complexidade. Por isso preferimos não dar prazos genéricos: explicamos as etapas com clareza ao analisar a sua situação.\" }\n    ];\n\n    const faqItems = faqData.map((f, i) => ({\n      q: f.q,\n      a: f.a,\n      toggle: () => this.setState(s => ({ open: s.open === i ? -1 : i })),\n      iconStyle: \"flex-shrink:0;width:26px;height:26px;border-radius:50%;background:rgba(45,90,61,.1);color:#2D5A3D;display:flex;align-items:center;justify-content:center;font-size:18px;font-weight:600;transition:transform .25s;transform:\" + (open === i ? \"rotate(45deg)\" : \"none\"),\n      panelStyle: open === i\n        ? \"max-height:400px;opacity:1;transition:max-height .35s ease,opacity .3s ease\"\n        : \"max-height:0;opacity:0;overflow:hidden;transition:max-height .3s ease,opacity .2s ease\"\n    }));\n\n    return {\n      waLink: this.waLink,\n      situacoes: [\n        { n: \"01\", t: \"Horas extras não pagas\" },\n        { n: \"02\", t: \"Acúmulo de função\" },\n        { n: \"03\", t: \"Trabalhar durante o almoço\" },\n        { n: \"04\", t: \"Trabalho sem registro em carteira\" },\n        { n: \"05\", t: \"Assédio moral no ambiente de trabalho\" },\n        { n: \"06\", t: \"Trabalhar com produtos químicos\" },\n        { n: \"07\", t: \"Dúvidas sobre justa causa\" },\n        { n: \"08\", t: \"FGTS não depositado\" },\n        { n: \"09\", t: \"PJ que trabalha como CLT\" },\n        { n: \"10\", t: \"Verbas rescisórias atrasadas\" }\n      ],\n      problemas: [\n        { t: \"Você fazia hora extra e não recebia?\", d: \"Ficar depois do horário, almoçar trabalhando ou responder mensagens fora do expediente pode contar. Quando isso não é pago corretamente, há o que verificar.\" },\n        { t: \"Foi contratado como PJ, mas trabalhava como CLT?\", d: \"Bater ponto, ter chefe direto e horário fixo, sem poder recusar tarefas: na prática, isso pode caracterizar vínculo de emprego, mesmo emitindo nota fiscal.\" },\n        { t: \"Saiu da empresa e a rescisão não fechou?\", d: \"Aviso, férias, 13º proporcional e saldo de salário têm regras. Quando os valores parecem baixos ou atrasam, vale conferir com cuidado.\" },\n        { t: \"Trabalhou sem carteira assinada?\", d: \"Trabalhar “por fora” não significa ficar sem direitos. É possível buscar o reconhecimento do período trabalhado e o que dele decorre.\" }\n      ],\n      passos: [\n        { n: \"01\", t: \"Contato pelo WhatsApp\", d: \"Você manda uma mensagem e conta, com suas palavras, o que aconteceu.\" },\n        { n: \"02\", t: \"Análise inicial do caso\", d: \"Ouvimos sua situação e identificamos os pontos que merecem atenção.\" },\n        { n: \"03\", t: \"Orientação personalizada\", d: \"Explicamos, de forma simples, o que se aplica ao seu caso e por quê.\" },\n        { n: \"04\", t: \"Próximos passos\", d: \"Você decide, com clareza e sem pressão, como deseja seguir.\" }\n      ],\n      beneficios: [\n        { t: \"Atendimento individualizado\", d: \"Sua história ouvida com atenção, do começo ao fim.\" },\n        { t: \"Orientação clara\", d: \"Respostas em linguagem simples, sem juridiquês.\" },\n        { t: \"Segurança jurídica\", d: \"Você entende seus direitos antes de qualquer decisão.\" },\n        { t: \"Análise profissional do caso\", d: \"Avaliação feita por quem atua na área há 10 anos.\" },\n        { t: \"Acompanhamento especializado\", d: \"Você não fica sozinho em nenhuma etapa.\" }\n      ],\n      diferenciais: [\n        { i: \"★\", t: \"10 anos de experiência\", d: \"Uma década dedicada exclusivamente ao Direito do Trabalho.\" },\n        { i: \"✸\", t: \"Comunicação transparente\", d: \"Tudo explicado de forma clara, sem surpresas no caminho.\" },\n        { i: \"⚡︎\", t: \"Agilidade no atendimento\", d: \"Resposta rápida para você não ficar na dúvida por dias.\" },\n        { i: \"∞\", t: \"Relação de longo prazo\", d: \"Estamos aqui sempre que você precisar de orientação.\" }\n      ],\n      stats: [\n        { v: \"10 anos\", l: \"de atuação em Direito do Trabalho\" },\n        { v: \"+2.500\", l: \"casos analisados\" },\n        { v: \"+1.800\", l: \"trabalhadores atendidos\" }\n      ],\n      depoimentos: [\n        { q: \"Eu tinha medo de perguntar e parecer bobo. Me explicaram tudo com paciência e finalmente entendi minha situação.\", n: \"Ricardo M.\", r: \"Ex-funcionário CLT\", in: \"R\" },\n        { q: \"Trabalhava como PJ e nem imaginava que valia a pena analisar. O atendimento foi humano e direto ao ponto.\", n: \"Camila S.\", r: \"Profissional PJ\", in: \"C\" }\n      ],\n      faqItems\n    };\n  }\n}\n<\u002Fscript>\n\n\n<\u002Fbody><\u002Fhtml>"},"entry":"BBSA Advogados.dc"}
